# ════════════════════════════════════════════════════════════════════════
#  Альтернатива Caddy — Nginx. HTTPS выдаётся отдельно через certbot:
#    sudo apt install -y nginx certbot python3-certbot-nginx apache2-utils
#    sudo certbot --nginx -d bridge.example.ru     # выпустит и пропишет сертификат
#
#  Сгенерировать файл паролей (логин admin):
#    sudo htpasswd -c /etc/nginx/.htpasswd admin   # спросит пароль
#    # добавить ещё пользователя — та же команда БЕЗ -c
#
#  Положить в /etc/nginx/sites-available/bridge.conf, включить симлинком в
#  sites-enabled, затем:  sudo nginx -t && sudo systemctl reload nginx
# ════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    server_name bridge.example.ru;        # ← твой домен

    # ssl_certificate / ssl_certificate_key пропишет certbot автоматически.

    # 1) Вебхук Битрикса — БЕЗ авторизации (защищён application_token в ядре).
    location = /bitrix/events {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2) Всё остальное (веб-морда, QR, формы входа, /incoming) — под Basic Auth.
    location / {
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass           http://127.0.0.1:8000;
        proxy_set_header     Host $host;
        proxy_set_header     X-Forwarded-For $remote_addr;
        proxy_set_header     X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS редирект (certbot обычно добавляет сам).
server {
    listen 80;
    server_name bridge.example.ru;
    return 301 https://$host$request_uri;
}
